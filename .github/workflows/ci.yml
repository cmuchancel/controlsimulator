name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: UV_NO_EDITABLE=1 uv sync --group dev
      - run: PYTHONPATH=src UV_NO_EDITABLE=1 uv run ruff check .
      - run: PYTHONPATH=src UV_NO_EDITABLE=1 uv run pytest -q
